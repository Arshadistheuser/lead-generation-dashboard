<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeadGen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      font-size: 12px;
    }
    .header {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 13px; font-weight: 600; }
    .badge {
      background: #3b82f6;
      color: white;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 500;
    }
    .section { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #666; margin-bottom: 4px; }
    .status-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
    .status-label { color: #888; font-size: 11px; }
    .status-value { font-family: monospace; font-weight: 600; font-size: 11px; }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
    .yellow { color: #eab308; }
    .blue { color: #3b82f6; }
    input[type="text"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 5px 8px;
      color: #fafafa;
      font-size: 11px;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    .btn {
      width: 100%;
      padding: 7px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-success { background: #22c55e; color: white; }
    .btn-outline { background: transparent; color: #888; border: 1px solid rgba(255,255,255,0.15); }
    .btn-sm { padding: 5px; font-size: 10px; }
    .btn-row { display: flex; gap: 4px; }
    .btn-row .btn { flex: 1; }
    .alert {
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-top: 4px;
    }
    .alert-success { background: rgba(34,197,94,0.15); color: #22c55e; }
    .alert-error { background: rgba(239,68,68,0.15); color: #ef4444; }
    .alert-info { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .hidden { display: none; }
    .results-row { display: flex; gap: 4px; margin-top: 4px; }
    .result-box {
      flex: 1;
      background: #1a1a1a;
      border-radius: 4px;
      padding: 6px;
      text-align: center;
    }
    .result-box .num { font-size: 16px; font-weight: 700; font-family: monospace; }
    .result-box .label { font-size: 9px; color: #888; }
    .company-list { max-height: 120px; overflow-y: auto; margin-top: 4px; }
    .company-item { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 11px; }
    .company-name { color: #fafafa; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .company-domain { color: #666; font-family: monospace; font-size: 10px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .footer { padding: 6px 12px; text-align: center; color: #444; font-size: 9px; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 4px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <h1>LeadGen Matcher</h1>
    <span class="badge" id="countBadge">0</span>
  </div>

  <!-- Dashboard URL -->
  <div class="section">
    <div class="section-title">Dashboard</div>
    <input type="text" id="dashboardUrl" placeholder="http://localhost:3000" />
  </div>

  <!-- Status -->
  <div class="section">
    <div class="status-row">
      <span class="status-label">Page</span>
      <span class="status-value" id="pageStatus">...</span>
    </div>
    <div class="status-row">
      <span class="status-label">Visible</span>
      <span class="status-value blue" id="visibleCount">—</span>
    </div>
    <div class="status-row">
      <span class="status-label">Captured</span>
      <span class="status-value green" id="totalCaptured">0</span>
    </div>
  </div>

  <!-- Capture -->
  <div class="section">
    <button class="btn btn-primary" id="captureBtn" disabled>Capture This Page</button>
    <div id="captureAlert" class="hidden"></div>
  </div>

  <!-- Captured list (compact) -->
  <div class="section" id="listSection">
    <div class="section-title">Recently Captured</div>
    <div class="company-list" id="companyList">
      <div style="color:#555;text-align:center;padding:4px">No companies yet</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="section">
    <button class="btn btn-success btn-sm" id="matchBtn" disabled>Match with HubSpot</button>
    <div class="btn-row">
      <button class="btn btn-outline btn-sm" id="exportCsvBtn" disabled>CSV</button>
      <button class="btn btn-outline btn-sm" id="clearBtn">Clear</button>
    </div>
    <div id="matchAlert" class="hidden"></div>
  </div>

  <!-- Results -->
  <div class="section hidden" id="resultsSection">
    <div class="results-row">
      <div class="result-box"><div class="num green" id="foundCount">0</div><div class="label">In HubSpot</div></div>
      <div class="result-box"><div class="num red" id="notFoundCount">0</div><div class="label">New</div></div>
      <div class="result-box"><div class="num yellow" id="possibleCount">0</div><div class="label">Maybe</div></div>
    </div>
    <button class="btn btn-outline btn-sm" id="viewInDashboardBtn" style="margin-top:4px">Open in Dashboard</button>
  </div>

  <div class="footer">Reads visible data only. No credits used.</div>
  <script src="popup.js"></script>
</body>
</html>
