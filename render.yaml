databases:
  - name: leadgen-db
    plan: free
    databaseName: leadgen
    user: leadgen

services:
  - type: web
    name: lead-generation-dashboard
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leadgen-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
